<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Notamy Fly - Turbo Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@100;200;300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html, body {
            touch-action: pan-x pan-y;
            -ms-touch-action: pan-x pan-y;
        }

        input, textarea, select {
            font-size: 16px !important;
        }

        :root {
            --primary-teal: #00fff0;
            --primary-light: #00fff0;
            --cyan-neon: #00fff0;
            --purple-accent: #ff00ff;
            --pink-neon: #ff0066;
            --orange-neon: #fff200;
            --green-neon: #39ff14;
            --yellow-neon: #fff200;
            --black-deep: #06000e;
            --white: #ffffff;
        }

        body {
            background: var(--black-deep);
            font-family: 'Orbitron', monospace, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            touch-action: none;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        #gameCanvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 60px rgba(0, 255, 240, 0.3), 0 0 120px rgba(255, 0, 255, 0.15);
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 72px;
            font-weight: 100;
            font-family: 'Orbitron', monospace, sans-serif;
            color: var(--white);
            text-shadow: 0 0 30px rgba(0, 255, 240, 0.8), 0 0 60px rgba(0, 255, 240, 0.4);
            opacity: 0.9;
            letter-spacing: -2px;
            transition: all 0.3s ease;
        }

        #score.combo {
            animation: comboFlash 0.5s ease;
        }

        @keyframes comboFlash {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.3); color: var(--yellow-neon); }
        }

        .combo-indicator {
            position: absolute;
            top: 140px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-family: 'Orbitron', monospace, sans-serif;
            color: var(--yellow-neon);
            text-shadow: 0 0 20px rgba(255, 242, 0, 0.8);
            opacity: 0;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .combo-indicator.active {
            opacity: 1;
            animation: comboPulse 0.5s ease;
        }

        @keyframes comboPulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* Milestone popup */
        .milestone-popup {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, var(--purple-accent), var(--cyan-neon));
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Orbitron', monospace, sans-serif;
            color: var(--white);
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 30px currentColor;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
        }

        .milestone-popup.show {
            animation: milestoneShow 2s ease;
        }

        @keyframes milestoneShow {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
        }

        /* Speed boost indicator */
        .speed-indicator {
            position: absolute;
            top: 200px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-family: 'Orbitron', monospace, sans-serif;
            color: var(--orange-neon);
            text-shadow: 0 0 15px currentColor;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .speed-indicator.active {
            opacity: 1;
            animation: speedPulse 1s ease infinite;
        }

        @keyframes speedPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }

        .powerup-indicator {
            position: absolute;
            top: 240px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .powerup-indicator.active {
            opacity: 1;
        }

        .powerup-bar {
            width: 120px;
            height: 8px;
            background: rgba(255, 0, 255, 0.15);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 240, 0.3);
        }

        .powerup-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--purple-accent), var(--cyan-neon));
            transition: width 0.3s ease;
            box-shadow: 0 0 10px currentColor;
        }

        .invincibility-countdown {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            font-family: 'Orbitron', monospace, sans-serif;
            color: var(--white);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 15;
        }

        .invincibility-countdown.active {
            opacity: 1;
        }

        .invincibility-countdown.ending {
            animation: countdownPulse 0.5s ease infinite;
        }

        @keyframes countdownPulse {
            0%, 100% { transform: translateX(-50%) scale(1); color: var(--white); }
            50% { transform: translateX(-50%) scale(1.3); color: var(--pink-neon); }
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a0033 0%, #06000e 70%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 0.3s ease;
        }

        .game-title {
            font-size: 72px;
            font-weight: 700;
            font-family: 'Orbitron', monospace, sans-serif;
            background: linear-gradient(45deg, #00fff0, #ff00ff, #39ff14);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 40px rgba(0, 255, 240, 0.5);
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .subtitle {
            font-size: 18px;
            font-family: 'Orbitron', monospace, sans-serif;
            color: var(--cyan-neon);
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(0, 255, 240, 0.5);
        }

        .difficulty-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .difficulty-btn {
            background: transparent;
            border: 2px solid rgba(0, 255, 240, 0.4);
            padding: 15px 30px;
            border-radius: 999px;
            font-size: 16px;
            font-family: 'Orbitron', monospace, sans-serif;
            color: var(--cyan-neon);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .difficulty-btn:hover {
            background: rgba(0, 255, 240, 0.1);
            border-color: rgba(0, 255, 240, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 255, 240, 0.3);
        }

        .difficulty-btn.active {
            background: transparent;
            border-color: #00fff0;
            color: #00fff0;
            font-weight: 700;
            box-shadow: 0 0 30px rgba(0, 255, 240, 0.5), inset 0 0 20px rgba(0, 255, 240, 0.1);
        }

        .tap-to-start {
            font-size: 24px;
            font-family: 'Orbitron', monospace, sans-serif;
            color: var(--cyan-neon);
            animation: pulse 2s ease-in-out infinite;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 255, 240, 0.6);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 0, 14, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .game-over-title {
            font-size: 56px;
            font-weight: 700;
            font-family: 'Orbitron', monospace, sans-serif;
            color: var(--pink-neon);
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(255, 0, 102, 0.6), 0 0 60px rgba(255, 0, 102, 0.3);
            letter-spacing: 2px;
        }

        .final-score {
            font-size: 96px;
            font-weight: 100;
            font-family: 'Orbitron', monospace, sans-serif;
            color: var(--cyan-neon);
            text-shadow: 0 0 40px rgba(0, 255, 240, 0.8), 0 0 80px rgba(0, 255, 240, 0.4);
            margin-bottom: 10px;
        }

        .best-score {
            font-size: 24px;
            font-family: 'Orbitron', monospace, sans-serif;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
        }

        .best-score span {
            color: var(--cyan-neon);
            font-weight: 500;
        }

        .stats-container {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            font-family: 'Orbitron', monospace, sans-serif;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            color: var(--cyan-neon);
            font-weight: 300;
            display: block;
            margin-top: 5px;
        }

        .play-again {
            background: transparent;
            border: 2px solid #00fff0;
            padding: 18px 50px;
            border-radius: 999px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Orbitron', monospace, sans-serif;
            color: #00fff0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 40px rgba(0, 255, 240, 0.3), inset 0 0 20px rgba(0, 255, 240, 0.05);
            transition: all 0.3s ease;
        }

        .play-again:hover {
            background: rgba(0, 255, 240, 0.1);
            box-shadow: 0 0 60px rgba(0, 255, 240, 0.5), inset 0 0 30px rgba(0, 255, 240, 0.1);
        }

        .play-again:active {
            transform: scale(0.95);
        }

        /* Achievement unlocked */
        .achievement {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #39ff14, #00fff0);
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Orbitron', monospace, sans-serif;
            color: #06000e;
            font-weight: bold;
            text-shadow: none;
            opacity: 0;
            transition: all 0.5s ease;
            pointer-events: none;
        }

        .achievement.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .instructions {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(0, 255, 240, 0.5);
            font-size: 16px;
            font-family: 'Orbitron', monospace, sans-serif;
        }

        .tap-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 10px;
            border: 2px solid rgba(0, 255, 240, 0.3);
            border-radius: 50%;
            position: relative;
            animation: tapHint 2s ease-in-out infinite;
        }

        .tap-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: rgba(0, 255, 240, 0.5);
            border-radius: 50%;
        }

        @keyframes tapHint {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .ready-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 700;
            font-family: 'Orbitron', monospace, sans-serif;
            color: var(--yellow-neon);
            text-shadow: 0 0 30px rgba(255, 242, 0, 0.8);
            opacity: 0;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            pointer-events: none;
            z-index: 15;
        }

        .ready-message.active {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .game-title {
                font-size: 56px;
            }

            #score {
                font-size: 56px;
                top: 40px;
            }

            .game-over-title {
                font-size: 42px;
            }

            .final-score {
                font-size: 72px;
            }

            .difficulty-selector {
                flex-direction: column;
                gap: 10px;
            }

            .stats-container {
                gap: 20px;
            }

            .ready-message {
                font-size: 36px;
            }

            .invincibility-countdown {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-overlay">
        <div id="score">0</div>
        <div class="combo-indicator" id="comboIndicator"></div>
        <div class="speed-indicator" id="speedIndicator">SPEED BOOST!</div>
        <div class="powerup-indicator" id="powerupIndicator">
            <div class="powerup-bar">
                <div class="powerup-fill" id="powerupFill"></div>
            </div>
        </div>
        <div class="invincibility-countdown" id="invincibilityCountdown"></div>
        <div class="ready-message" id="readyMessage">GET READY!</div>
        <div class="milestone-popup" id="milestonePopup"></div>
        <div class="achievement" id="achievement"></div>
    </div>

    <div id="startScreen">
        <h1 class="game-title">Notamy Fly</h1>
        <p class="subtitle">Turbo Edition</p>
        <div class="difficulty-selector">
            <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
            <button class="difficulty-btn" data-difficulty="normal">Normal</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard</button>
            <button class="difficulty-btn" data-difficulty="insane">Insane</button>
            <button class="difficulty-btn" data-difficulty="nightmare">Nightmare</button>
        </div>
        <div class="instructions">
            <div class="tap-icon"></div>
            <p>Tap to fly</p>
        </div>
        <p class="tap-to-start">Tap to Start</p>
    </div>

    <div id="gameOverScreen">
        <h2 class="game-over-title">GAME OVER</h2>
        <div class="final-score" id="finalScore">0</div>
        <div class="best-score">Best: <span id="bestScore">0</span></div>
        <div class="stats-container">
            <div class="stat-item">
                <div>Combo</div>
                <div class="stat-value" id="maxCombo">0</div>
            </div>
            <div class="stat-item">
                <div>Power-ups</div>
                <div class="stat-value" id="powerupsCollected">0</div>
            </div>
            <div class="stat-item">
                <div>Speed</div>
                <div class="stat-value" id="maxSpeed">1.0x</div>
            </div>
        </div>
        <button class="play-again" onclick="restartGame()">PLAY AGAIN</button>
    </div>

    <script>
        // Prevent zoom
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });

        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        });

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game dimensions
        let WIDTH = Math.min(window.innerWidth, 800);
        let HEIGHT = Math.min(window.innerHeight, 600);
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        // Frame rate control
        let lastTime = 0;
        const targetFPS = 60;
        const frameTime = 1000 / targetFPS;

        // Difficulty settings - MADE MORE RESPONSIVE AND ENGAGING
        const difficulties = {
            easy: {
                pipeSpeed: 2.5,
                pipeGap: 300,
                gravity: 0.25,
                jumpForce: -7.5,
                scoreMultiplier: 1,
                powerupChance: 0.5,
                winScore: 600
            },
            normal: {
                pipeSpeed: 3.0,
                pipeGap: 260,
                gravity: 0.35,
                jumpForce: -8.5,
                scoreMultiplier: 1.5,
                powerupChance: 0.4,
                winScore: 450
            },
            hard: {
                pipeSpeed: 3.8,
                pipeGap: 230,
                gravity: 0.45,
                jumpForce: -9.5,
                scoreMultiplier: 2,
                powerupChance: 0.35,
                winScore: 300
            },
            insane: {
                pipeSpeed: 4.5,
                pipeGap: 200,
                gravity: 0.55,
                jumpForce: -10.5,
                scoreMultiplier: 3,
                powerupChance: 0.3,
                winScore: 200
            },
            nightmare: {
                pipeSpeed: 5.5,
                pipeGap: 180,
                gravity: 0.65,
                jumpForce: -11.5,
                scoreMultiplier: 5,
                powerupChance: 0.25,
                winScore: 150
            }
        };

        let currentDifficulty = 'easy';
        let settings = difficulties[currentDifficulty];
        let progressiveMode = false;

        // Progressive difficulty: smoothly ramps all settings based on score
        function updateProgressiveDifficulty() {
            if (!progressiveMode) return;
            const progress = Math.min(1, score / settings.winScore); // 0 to 1

            // Interpolate from easy to nightmare over the game
            const lerp = (a, b) => a + (b - a) * progress;

            settings.pipeGap = Math.round(lerp(300, 190));       // 300 → 190
            settings.gravity = lerp(0.25, 0.55);                 // 0.25 → 0.55
            settings.jumpForce = lerp(-7.5, -10.5);              // -7.5 → -10.5
            settings.pipeSpeed = lerp(2.5, 4.5);                 // 2.5 → 4.5
            settings.powerupChance = lerp(0.5, 0.2);             // 50% → 20%
        }

        // Game constants
        const PIPE_WIDTH = 60;
        const PIPE_SPACING = 350; // Reduced from 450 for more action

        // Colors — cyberpunk palette
        const COLORS = {
            bird: '#fff200',
            birdGlow: '#00fff0',
            pipe: '#ff00ff',
            pipeGlow: '#00fff0',
            particle: '#ff00ff',
            powerup: '#fff200',
            shield: '#ff0066',
            magnet: '#39ff14',
            speed: '#00fff0',
            multiplier: '#ff00ff'
        };

        // Game state
        let gameState = 'start';
        let score = 0;
        let bestScore = 0;
        let speedMultiplier = 1;
        let maxSpeedReached = 1;

        // Timers for UI elements
        let comboTimeout = null;
        let speedBoostTimeout = null;
        let firstPipeTimer = null;

        // Safe localStorage handling
        try {
            bestScore = parseInt(localStorage.getItem('notamyFlyBest') || '0');
        } catch (e) {
            bestScore = 0;
        }

        let frameCount = 0;
        let combo = 0;
        let maxCombo = 0;
        let powerupsCollected = 0;
        let achievements = [];
        let milestones = [10, 25, 50, 100, 150, 200, 300, 500, 1000];
        let enteredFinalZone = false;
        let nextMilestone = 0;

        // === BOSS PHASE ===
        let bossPhase = false;
        let bossTimer = 0;
        const BOSS_DURATION = 150 * 60; // 150 seconds at 60fps
        let enemies = [];
        let enemyBullets = [];
        let bossSpawnTimer = 0;
        let bossWave = 0;
        let birdBullets = [];
        let birdShootTimer = 0;
        const BIRD_SHOOT_INTERVAL = 12; // auto-fire every 12 frames (~5 shots/sec)

        // Bird object - FIXED INITIALIZATION
        const bird = {
            x: WIDTH * 0.25,
            y: HEIGHT / 2,
            velocity: 0,
            radius: 16,
            trail: [],
            angle: 0,
            shielded: false,
            shieldTime: 0,
            magnetized: false,
            magnetTime: 0,
            invincible: false,
            invincibleTime: 0,
            wingAnimation: 0,
            speedBoost: false,
            speedBoostTime: 0,
            scoreMultiplier: 1,
            scoreMultiplierTime: 0
        };

        // Arrays
        let pipes = [];
        let particles = [];
        let backgroundParticles = [];
        let powerups = [];
        let stars = [];
        let missiles = [];
        let missileWarnings = [];

        // Initialize background elements
        function initBackgroundElements() {
            backgroundParticles = [];
            for (let i = 0; i < 60; i++) {
                backgroundParticles.push({
                    x: Math.random() * WIDTH,
                    y: Math.random() * HEIGHT,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 0.8 + 0.3,
                    opacity: Math.random() * 0.3 + 0.1
                });
            }

            stars = [];
            for (let i = 0; i < 80; i++) {
                stars.push({
                    x: Math.random() * WIDTH,
                    y: Math.random() * HEIGHT,
                    size: Math.random() * 2.5 + 0.5,
                    speed: Math.random() * 0.5 + 0.15,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }

        // Difficulty selector
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentDifficulty = e.target.dataset.difficulty;
                settings = difficulties[currentDifficulty];
                progressiveMode = false;
            });
        });

        // Input handling
        // Use touchstart only — suppress synthetic click from touch to prevent double-jump
        canvas.addEventListener('touchstart', handleInput, { passive: false });
        canvas.addEventListener('click', (e) => {
            // Only handle click from mouse, not synthetic click from touch
            if (e.sourceCapabilities && e.sourceCapabilities.firesTouchEvents) return;
            handleInput(e);
        });
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput(e);
            }
        });

        function handleInput(e) {
            if (e.preventDefault) e.preventDefault();

            if (gameState === 'start') {
                startGame();
            } else if (gameState === 'playing') {
                jump();
            }
        }

        function jump() {
            // More responsive jump with speed boost
            const jumpMultiplier = bird.speedBoost ? 1.2 : 1;
            bird.velocity = settings.jumpForce * jumpMultiplier;
            bird.wingAnimation = 20;

            // Create more dramatic jump particles
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: bird.x,
                    y: bird.y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: Math.random() * 3 + 2,
                    size: Math.random() * 6 + 3,
                    color: bird.shielded ? COLORS.shield : (bird.speedBoost ? COLORS.speed : COLORS.bird),
                    life: 35,
                    type: 'jump'
                });
            }

            // Vibrate if available
            if (window.navigator.vibrate) {
                window.navigator.vibrate(15);
            }
        }

        function startGame() {
            const startScreen = document.getElementById('startScreen');
            if (startScreen.style.display !== 'none') {
                startScreen.style.opacity = '0';
                setTimeout(() => {
                    startScreen.style.display = 'none';
                }, 300);
            }

            const readyMessage = document.getElementById('readyMessage');
            readyMessage.classList.add('active');
            setTimeout(() => {
                readyMessage.classList.remove('active');
            }, 2000);

            gameState = 'playing';
            score = 0;
            combo = 0;
            maxCombo = 0;
            powerupsCollected = 0;
            frameCount = 0;
            speedMultiplier = 1;
            maxSpeedReached = 1;
            nextMilestone = 0;
            enteredFinalZone = false;

            // Clear any existing timeouts
            if (comboTimeout) clearTimeout(comboTimeout);
            if (speedBoostTimeout) clearTimeout(speedBoostTimeout);
            if (firstPipeTimer) clearTimeout(firstPipeTimer);

            // Reset bird with validation
            bird.x = WIDTH * 0.25;
            bird.y = HEIGHT / 2;
            bird.velocity = 0;
            bird.trail = [];
            bird.angle = 0;
            bird.shielded = false;
            bird.shieldTime = 0;
            bird.magnetized = false;
            bird.magnetTime = 0;
            bird.invincible = true;
            bird.invincibleTime = 180; // 3 seconds of invincibility at start
            bird.wingAnimation = 0;
            bird.speedBoost = false;
            bird.speedBoostTime = 0;
            bird.scoreMultiplier = 1;
            bird.scoreMultiplierTime = 0;

            pipes = [];
            particles = [];
            powerups = [];
            missiles = [];
            missileWarnings = [];
            enemies = [];
            enemyBullets = [];
            birdBullets = [];
            bossPhase = false;
            bossTimer = 0;
            bossWave = 0;
            bossSpawnTimer = 0;
            birdShootTimer = 0;

            // Create first pipe sooner — store timer ID to cancel on restart
            firstPipeTimer = setTimeout(() => {
                createPipe();
                firstPipeTimer = null;
            }, 2000);
        }

        // Final zone: last 20% before win, difficulty ramps
        function getFinalZoneIntensity() {
            if (!settings.winScore) return 0;
            const threshold = settings.winScore * 0.8;
            if (score < threshold) return 0;
            return Math.min(1, (score - threshold) / (settings.winScore - threshold));
        }

        function createPipe() {
            // Final zone: gap shrinks up to 20%
            const finalIntensity = getFinalZoneIntensity();
            const gapReduction = finalIntensity * settings.pipeGap * 0.2;
            const effectiveGap = settings.pipeGap - gapReduction;

            const minHeight = 80;
            const maxHeight = Math.max(minHeight + 10, HEIGHT - effectiveGap - minHeight);
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;

            // Some pipes oscillate vertically (more likely at higher scores)
            // Moving pipes: appear early, scale to 60%
            const movingChance = Math.min(0.6, score * 0.005);
            const isMoving = Math.random() < movingChance;
            const moveAmplitude = isMoving ? 20 + Math.random() * 25 : 0;
            const moveSpeed = isMoving ? 0.02 + Math.random() * 0.015 : 0;

            pipes.push({
                x: WIDTH + PIPE_WIDTH,
                topHeight: topHeight,
                bottomY: topHeight + effectiveGap,
                baseTopHeight: topHeight,
                gap: effectiveGap,
                passed: false,
                finalZone: finalIntensity > 0,
                moving: isMoving,
                movePhase: Math.random() * Math.PI * 2,
                moveAmplitude: moveAmplitude,
                moveSpeed: moveSpeed,
                particles: []
            });
        }

        function createPowerup(x, y) {
            const types = ['shield', 'magnet', 'points', 'speed', 'multiplier'];
            const weights = [20, 20, 30, 15, 15]; // Probability weights
            const type = weightedRandom(types, weights);

            powerups.push({
                x: x,
                y: y,
                type: type,
                radius: 25,
                collected: false,
                rotation: 0,
                wobble: Math.random() * Math.PI * 2
            });
        }

        function weightedRandom(items, weights) {
            const totalWeight = weights.reduce((a, b) => a + b, 0);
            let random = Math.random() * totalWeight;

            for (let i = 0; i < items.length; i++) {
                random -= weights[i];
                if (random <= 0) return items[i];
            }
            return items[0];
        }

        // Missile system
        function spawnMissileWarning() {
            // Warning appears on right edge for 1 second, then missile launches
            const y = 60 + Math.random() * (HEIGHT - 120);
            missileWarnings.push({
                y: y,
                timer: 60, // 1 second at 60fps
                speed: 6 + speedMultiplier * 2
            });
        }

        function updateMissiles() {
            // Update warnings → spawn missiles when timer expires
            for (let i = missileWarnings.length - 1; i >= 0; i--) {
                const w = missileWarnings[i];
                w.timer--;
                if (w.timer <= 0) {
                    missiles.push({
                        x: WIDTH + 20,
                        y: w.y,
                        speed: w.speed,
                        size: 8,
                        trail: []
                    });
                    missileWarnings.splice(i, 1);
                }
            }

            // Update missiles
            for (let i = missiles.length - 1; i >= 0; i--) {
                const m = missiles[i];
                m.x -= m.speed;
                m.trail.push({ x: m.x + 15, y: m.y, life: 15 });
                if (m.trail.length > 10) m.trail.shift();
                m.trail.forEach(t => t.life--);

                // Off screen
                if (m.x < -30) {
                    missiles.splice(i, 1);
                    continue;
                }

                // Collision with bird
                if (gameState === 'playing' && !bird.invincible) {
                    const dx = m.x - bird.x;
                    const dy = m.y - bird.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < bird.radius + m.size) {
                        missiles.splice(i, 1);
                        if (bird.shielded) {
                            bird.shielded = false;
                            bird.shieldTime = 0;
                            bird.invincible = true;
                            bird.invincibleTime = 90;
                            maxCombo = Math.max(maxCombo, combo);
                            combo = 0;
                            for (let p = 0; p < 20; p++) {
                                particles.push({
                                    x: bird.x, y: bird.y,
                                    vx: (Math.random() - 0.5) * 10,
                                    vy: (Math.random() - 0.5) * 10,
                                    size: Math.random() * 8 + 3,
                                    color: '#ff3333', life: 30, type: 'explosion'
                                });
                            }
                            showAchievement("Shield blocked missile!");
                        } else {
                            gameOver();
                        }
                        continue;
                    }
                }
            }
        }

        function drawMissiles() {
            // Draw warnings (flashing red markers on right edge)
            missileWarnings.forEach(w => {
                const flash = Math.sin(w.timer * 0.5) > 0 ? 1 : 0.3;
                ctx.save();
                ctx.globalAlpha = flash;
                // Arrow on right edge
                ctx.fillStyle = '#ff0066';
                ctx.beginPath();
                ctx.moveTo(WIDTH - 5, w.y - 8);
                ctx.lineTo(WIDTH - 15, w.y);
                ctx.lineTo(WIDTH - 5, w.y + 8);
                ctx.closePath();
                ctx.fill();
                // Horizontal line
                ctx.strokeStyle = 'rgba(255, 0, 102, 0.3)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 8]);
                ctx.beginPath();
                ctx.moveTo(0, w.y);
                ctx.lineTo(WIDTH, w.y);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            });

            // Draw missiles
            missiles.forEach(m => {
                // Trail
                m.trail.forEach(t => {
                    if (t.life > 0) {
                        ctx.fillStyle = `rgba(255, 0, 255, ${t.life / 15 * 0.6})`;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, 3 + (15 - t.life) * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                // Missile body
                ctx.fillStyle = '#ff0066';
                ctx.shadowColor = '#ff0066';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.size, 0, Math.PI * 2);
                ctx.fill();
                // Nose
                ctx.fillStyle = '#ff66aa';
                ctx.beginPath();
                ctx.moveTo(m.x - m.size - 4, m.y - 4);
                ctx.lineTo(m.x - m.size - 12, m.y);
                ctx.lineTo(m.x - m.size - 4, m.y + 4);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        // === BOSS PHASE FUNCTIONS ===
        function enterBossPhase() {
            bossPhase = true;
            bossTimer = 0;
            bossWave = 0;
            bossSpawnTimer = 0;
            enemies = [];
            enemyBullets = [];
            pipes = []; // clear remaining pipes
            missiles = [];
            missileWarnings = [];
            showMilestone('INCOMING!');
            // Give player a shield to start
            bird.shielded = true;
            bird.shieldTime = 300; // 5 seconds
        }

        function spawnEnemy() {
            const phase = Math.min(1, bossTimer / BOSS_DURATION);
            // Enemy types get harder over time
            const isFast = Math.random() < phase * 0.4;
            const y = 40 + Math.random() * (HEIGHT - 80);
            enemies.push({
                x: WIDTH + 30,
                y: y,
                baseY: y,
                vx: isFast ? -(3 + phase * 3) : -(1.5 + phase * 2),
                size: isFast ? 14 : 20,
                health: isFast ? 1 : 2,
                shootTimer: Math.floor(Math.random() * 60) + 30,
                shootInterval: isFast ? 90 : 60,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.02 + Math.random() * 0.02,
                wobbleAmp: 20 + Math.random() * 30,
                color: isFast ? '#ff0066' : '#ff00ff',
                fast: isFast
            });
        }

        function updateBossPhase() {
            if (!bossPhase) return;
            bossTimer++;

            // Victory!
            if (bossTimer >= BOSS_DURATION) {
                victory();
                return;
            }

            const phase = Math.min(1, bossTimer / BOSS_DURATION); // 0 → 1

            // Spawn enemies in waves
            bossSpawnTimer++;
            const spawnRate = Math.max(30, 120 - phase * 80); // 120 → 40 frames between spawns
            if (bossSpawnTimer >= spawnRate) {
                bossSpawnTimer = 0;
                spawnEnemy();
                // Double spawn in later phases
                if (phase > 0.4 && Math.random() < phase * 0.5) {
                    spawnEnemy();
                }
            }

            // Spawn power-ups periodically during boss
            if (bossTimer > 0 && bossTimer % 300 === 0) { // every 5 seconds
                const types = ['shield', 'magnet', 'points', 'speed'];
                const type = types[Math.floor(Math.random() * types.length)];
                powerups.push({
                    x: WIDTH + 20,
                    y: 60 + Math.random() * (HEIGHT - 120),
                    type: type,
                    radius: 25,
                    collected: false,
                    rotation: 0,
                    wobble: Math.random() * Math.PI * 2
                });
            }

            // Bird auto-fire
            birdShootTimer++;
            if (birdShootTimer >= BIRD_SHOOT_INTERVAL) {
                birdShootTimer = 0;
                birdBullets.push({
                    x: bird.x + bird.radius,
                    y: bird.y,
                    vx: 8,
                    vy: 0,
                    size: 4,
                    life: 120
                });
            }

            // Update bird bullets
            for (let i = birdBullets.length - 1; i >= 0; i--) {
                const b = birdBullets[i];
                b.x += b.vx;
                b.life--;
                if (b.x > WIDTH + 20 || b.life <= 0) {
                    birdBullets.splice(i, 1);
                    continue;
                }
                // Check hit on enemies
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    const dx = b.x - e.x;
                    const dy = b.y - e.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < e.size + b.size) {
                        birdBullets.splice(i, 1);
                        e.health--;
                        // Hit particles
                        for (let p = 0; p < 8; p++) {
                            particles.push({
                                x: e.x, y: e.y,
                                vx: (Math.random() - 0.5) * 8,
                                vy: (Math.random() - 0.5) * 8,
                                size: Math.random() * 5 + 2,
                                color: '#00fff0', life: 20, type: 'explosion'
                            });
                        }
                        if (e.health <= 0) {
                            // Destroy enemy
                            score += e.fast ? 5 : 10;
                            document.getElementById('score').textContent = score;
                            for (let p = 0; p < 15; p++) {
                                particles.push({
                                    x: e.x, y: e.y,
                                    vx: (Math.random() - 0.5) * 12,
                                    vy: (Math.random() - 0.5) * 12,
                                    size: Math.random() * 8 + 3,
                                    color: e.color, life: 40, type: 'explosion'
                                });
                            }
                            enemies.splice(j, 1);
                        }
                        break;
                    }
                }
            }

            // Update enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.vx;
                e.wobble += e.wobbleSpeed;
                e.y = e.baseY + Math.sin(e.wobble) * e.wobbleAmp;
                e.y = Math.max(e.size, Math.min(HEIGHT - e.size, e.y));

                // Remove off-screen
                if (e.x < -50) {
                    enemies.splice(i, 1);
                    continue;
                }

                // Enemy shoots
                e.shootTimer--;
                if (e.shootTimer <= 0) {
                    e.shootTimer = e.shootInterval;
                    // Shoot toward bird
                    const dx = bird.x - e.x;
                    const dy = bird.y - e.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 0) {
                        const bulletSpeed = e.fast ? 5 : 3.5;
                        enemyBullets.push({
                            x: e.x - e.size,
                            y: e.y,
                            vx: (dx / dist) * bulletSpeed,
                            vy: (dy / dist) * bulletSpeed,
                            size: 5,
                            life: 300
                        });
                    }
                }

                // Collision with bird
                if (gameState === 'playing' && !bird.invincible) {
                    const dx = e.x - bird.x;
                    const dy = e.y - bird.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < bird.radius + e.size) {
                        if (bird.shielded) {
                            bird.shielded = false;
                            bird.shieldTime = 0;
                            bird.invincible = true;
                            bird.invincibleTime = 90;
                            enemies.splice(i, 1);
                            for (let p = 0; p < 20; p++) {
                                particles.push({
                                    x: e.x, y: e.y,
                                    vx: (Math.random() - 0.5) * 12,
                                    vy: (Math.random() - 0.5) * 12,
                                    size: Math.random() * 8 + 3,
                                    color: e.color, life: 35, type: 'explosion'
                                });
                            }
                            showAchievement('Shield blocked ship!');
                            continue;
                        } else {
                            gameOver();
                            return;
                        }
                    }
                }
            }

            // Update enemy bullets
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                b.x += b.vx;
                b.y += b.vy;
                b.life--;

                if (b.x < -20 || b.x > WIDTH + 20 || b.y < -20 || b.y > HEIGHT + 20 || b.life <= 0) {
                    enemyBullets.splice(i, 1);
                    continue;
                }

                // Hit bird
                if (gameState === 'playing' && !bird.invincible) {
                    const dx = b.x - bird.x;
                    const dy = b.y - bird.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < bird.radius + b.size) {
                        enemyBullets.splice(i, 1);
                        if (bird.shielded) {
                            bird.shielded = false;
                            bird.shieldTime = 0;
                            bird.invincible = true;
                            bird.invincibleTime = 60;
                            for (let p = 0; p < 15; p++) {
                                particles.push({
                                    x: bird.x, y: bird.y,
                                    vx: (Math.random() - 0.5) * 10,
                                    vy: (Math.random() - 0.5) * 10,
                                    size: Math.random() * 6 + 2,
                                    color: '#ff0066', life: 25, type: 'shield'
                                });
                            }
                            showAchievement('Shield!');
                        } else {
                            gameOver();
                            return;
                        }
                        continue;
                    }
                }
            }
        }

        function drawBossPhase() {
            if (!bossPhase) return;

            // Draw enemies
            enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);

                // Glow
                ctx.shadowColor = e.color;
                ctx.shadowBlur = 15;

                // Ship body (triangle pointing left)
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.moveTo(-e.size, 0);
                ctx.lineTo(e.size, -e.size * 0.7);
                ctx.lineTo(e.size, e.size * 0.7);
                ctx.closePath();
                ctx.fill();

                // Cockpit
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(e.size * 0.3, 0, e.size * 0.25, 0, Math.PI * 2);
                ctx.fill();

                // Engine glow
                ctx.fillStyle = e.fast ? '#00fff0' : '#fff200';
                ctx.beginPath();
                ctx.arc(e.size + 3, 0, 4 + Math.sin(frameCount * 0.3) * 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.restore();
            });

            // Draw enemy bullets
            enemyBullets.forEach(b => {
                ctx.fillStyle = '#ff0066';
                ctx.shadowColor = '#ff0066';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
                // Trail
                ctx.fillStyle = 'rgba(255, 0, 102, 0.3)';
                ctx.beginPath();
                ctx.arc(b.x - b.vx * 2, b.y - b.vy * 2, b.size * 0.7, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Draw bird bullets
            birdBullets.forEach(b => {
                ctx.fillStyle = '#00fff0';
                ctx.shadowColor = '#00fff0';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
                // Streak trail
                ctx.fillStyle = 'rgba(0, 255, 240, 0.3)';
                ctx.fillRect(b.x - 12, b.y - 1.5, 12, 3);
                ctx.shadowBlur = 0;
            });

            // Boss timer progress bar
            const progress = bossTimer / BOSS_DURATION;
            const barW = WIDTH - 40;
            const barY = 40;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fillRect(20, barY, barW, 6);
            const g = ctx.createLinearGradient(20, 0, 20 + barW, 0);
            g.addColorStop(0, '#ff0066');
            g.addColorStop(0.5, '#ff00ff');
            g.addColorStop(1, '#39ff14');
            ctx.fillStyle = g;
            ctx.fillRect(20, barY, barW * progress, 6);

            // "SURVIVE" text
            const remaining = Math.ceil((BOSS_DURATION - bossTimer) / 60);
            ctx.fillStyle = remaining < 30 ? '#39ff14' : '#ff0066';
            ctx.font = 'bold 14px Orbitron, monospace';
            ctx.textAlign = 'center';
            ctx.fillText('SURVIVE ' + remaining + 's', WIDTH / 2, barY + 22);
        }

        function updateBird() {
            // Validate bird position
            if (!bird || typeof bird.x !== 'number' || typeof bird.y !== 'number' ||
                isNaN(bird.x) || isNaN(bird.y)) {
                // Reset bird to safe position
                bird.x = WIDTH * 0.25;
                bird.y = HEIGHT / 2;
                bird.velocity = 0;
            }

            // Apply gravity with speed modifier
            const gravityModifier = bird.speedBoost ? 0.85 : 1;
            bird.velocity += settings.gravity * gravityModifier * speedMultiplier;
            bird.y += bird.velocity;

            // Limit max fall speed
            const maxFallSpeed = bird.speedBoost ? 10 : 8;
            if (bird.velocity > maxFallSpeed) {
                bird.velocity = maxFallSpeed;
            }

            // Update angle based on velocity
            bird.angle = Math.max(-30, Math.min(90, bird.velocity * 3));

            // Update wing animation
            if (bird.wingAnimation > 0) {
                bird.wingAnimation--;
            }

            // Update trail with longer history
            bird.trail.push({ x: bird.x, y: bird.y, opacity: 1 });
            if (bird.trail.length > (bird.speedBoost ? 20 : 12)) {
                bird.trail.shift();
            }

            // Fade trail
            bird.trail.forEach((point, i) => {
                point.opacity = (i / bird.trail.length) * 0.7;
            });

            // Update power-ups
            if (bird.shieldTime > 0) {
                bird.shieldTime--;
                if (bird.shieldTime === 0) {
                    bird.shielded = false;
                }
            }

            if (bird.magnetTime > 0) {
                bird.magnetTime--;
                if (bird.magnetTime === 0) {
                    bird.magnetized = false;
                }
            }

            if (bird.speedBoostTime > 0) {
                bird.speedBoostTime--;
                if (bird.speedBoostTime === 0) {
                    bird.speedBoost = false;
                    speedMultiplier = Math.max(1, speedMultiplier * 0.8);
                }
            }

            if (bird.scoreMultiplierTime > 0) {
                bird.scoreMultiplierTime--;
                if (bird.scoreMultiplierTime === 0) {
                    bird.scoreMultiplier = 1;
                }
            }

            // Update invincibility with countdown
            if (bird.invincibleTime > 0) {
                bird.invincibleTime--;
                updateInvincibilityCountdown();
                if (bird.invincibleTime === 0) {
                    bird.invincible = false;
                }
            }

            // Create movement particles
            if (frameCount % 4 === 0) {
                const particleCount = bird.speedBoost ? 3 : 1;
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: bird.x - 10 - i * 5,
                        y: bird.y + (Math.random() - 0.5) * 10,
                        vx: -3 - Math.random() * 3 - (bird.speedBoost ? 2 : 0),
                        vy: (Math.random() - 0.5) * 3,
                        size: Math.random() * 4 + 2,
                        color: bird.speedBoost ? COLORS.speed : (bird.shielded ? COLORS.shield : COLORS.particle),
                        life: bird.speedBoost ? 30 : 20,
                        type: 'trail'
                    });
                }
            }

            // Check boundaries — collision BEFORE clamping so border death is reachable
            if (!bird.invincible && (bird.y - bird.radius <= 0 || bird.y + bird.radius >= HEIGHT)) {
                if (bird.shielded) {
                    bird.shielded = false;
                    bird.shieldTime = 0;
                    bird.invincible = true;
                    bird.invincibleTime = 60;
                    bird.velocity = bird.y < HEIGHT / 2 ? 3 : -3; // bounce away from edge
                    showAchievement("Shield Save!");
                } else {
                    gameOver();
                    return;
                }
            }

            // Clamp position after collision check
            if (bird.y - bird.radius < 0) {
                bird.y = bird.radius;
                bird.velocity = Math.max(bird.velocity, 0);
            } else if (bird.y + bird.radius > HEIGHT) {
                bird.y = HEIGHT - bird.radius;
                bird.velocity = Math.min(bird.velocity, 0);
            }

            // Progressive difficulty — aggressive curve for long game
            const difficultyStep = Math.floor(score / 10);
            let targetSpeed = 1 + difficultyStep * 0.04;

            // Final zone: extra speed ramp (up to +0.4x on top of base)
            const finalIntensity = getFinalZoneIntensity();
            if (finalIntensity > 0) {
                targetSpeed += finalIntensity * 0.4;
            }

            if (targetSpeed > speedMultiplier && speedMultiplier < 2.5) {
                speedMultiplier = Math.min(2.5, targetSpeed);
                maxSpeedReached = Math.max(maxSpeedReached, speedMultiplier);
            }
        }

        function updateInvincibilityCountdown() {
            const countdown = document.getElementById('invincibilityCountdown');

            if (bird.invincibleTime > 0 && bird.invincibleTime <= 180) {
                const seconds = Math.ceil(bird.invincibleTime / 60);
                countdown.textContent = seconds;
                countdown.classList.add('active');

                if (bird.invincibleTime <= 60) {
                    countdown.classList.add('ending');
                } else {
                    countdown.classList.remove('ending');
                }
            } else {
                countdown.classList.remove('active', 'ending');
            }
        }

        function updatePipes() {
            for (let pi = 0; pi < pipes.length; pi++) {
                const pipe = pipes[pi];
                pipe.x -= settings.pipeSpeed * speedMultiplier;

                // Oscillating pipes
                if (pipe.moving) {
                    pipe.movePhase += pipe.moveSpeed;
                    const offset = Math.sin(pipe.movePhase) * pipe.moveAmplitude;
                    pipe.topHeight = Math.max(30, Math.min(HEIGHT - pipe.gap - 30, pipe.baseTopHeight + offset));
                    pipe.bottomY = pipe.topHeight + pipe.gap;
                }

                // Check if bird passed pipe (guard: only score while playing)
                if (!pipe.passed && pipe.x + PIPE_WIDTH < bird.x && gameState === 'playing') {
                    pipe.passed = true;
                    const points = Math.floor(1 * settings.scoreMultiplier * bird.scoreMultiplier);
                    score += points;
                    combo++;

                    // Update progressive difficulty
                    updateProgressiveDifficulty();

                    // Check win condition → enter boss phase
                    if (settings.winScore && score >= settings.winScore && !bossPhase) {
                        enterBossPhase();
                        return;
                    }

                    // Spawn missiles — start at score 5, frequency ramps to every 2 pipes
                    const missileInterval = Math.max(2, 8 - Math.floor(score / 30));
                    if (score > 5 && score % missileInterval === 0) {
                        spawnMissileWarning();
                        // Double missile in late game
                        if (score > settings.winScore * 0.6 && Math.random() < 0.3) {
                            setTimeout(() => { if (gameState === 'playing') spawnMissileWarning(); }, 300);
                        }
                    }

                    // Final zone announcement (once, at 80% of win score)
                    if (settings.winScore && !enteredFinalZone && score >= settings.winScore * 0.8) {
                        enteredFinalZone = true;
                        showMilestone('FINAL ZONE!');
                    }

                    // Check milestones
                    checkMilestone();

                    // Update UI
                    document.getElementById('score').textContent = score;

                    // Enhanced combo effects
                    if (combo >= 3) {
                        document.getElementById('score').classList.add('combo');
                        setTimeout(() => {
                            document.getElementById('score').classList.remove('combo');
                        }, 500);

                        const comboBonus = Math.floor(combo / 3);
                        score += comboBonus;
                        document.getElementById('score').textContent = score;

                        document.getElementById('comboIndicator').textContent = `${combo}x COMBO! +${comboBonus}`;
                        document.getElementById('comboIndicator').classList.add('active');

                        if (comboTimeout) clearTimeout(comboTimeout);
                        comboTimeout = setTimeout(() => {
                            document.getElementById('comboIndicator').classList.remove('active');
                        }, 2000);
                    }

                    // Score particles
                    for (let i = 0; i < 15; i++) {
                        particles.push({
                            x: bird.x,
                            y: bird.y,
                            vx: (Math.random() - 0.5) * 8,
                            vy: (Math.random() - 0.5) * 8,
                            size: Math.random() * 8 + 3,
                            color: combo >= 3 ? COLORS.powerup : COLORS.pipeGlow,
                            life: 45,
                            type: 'score'
                        });
                    }

                    // Spawn power-up
                    if (Math.random() < settings.powerupChance) {
                        const pipeCenter = (pipe.topHeight + pipe.bottomY) / 2;
                        const offsetY = (Math.random() - 0.5) * settings.pipeGap * 0.6;
                        createPowerup(pipe.x + PIPE_WIDTH + 150, pipeCenter + offsetY);
                    }

                    // Vibrate on score
                    if (window.navigator.vibrate) {
                        window.navigator.vibrate(20);
                    }
                }

                // Create pipe edge particles
                if (frameCount % 10 === 0) {
                    pipe.particles.push({
                        x: pipe.x + PIPE_WIDTH,
                        y: pipe.topHeight,
                        life: 30
                    });
                    pipe.particles.push({
                        x: pipe.x + PIPE_WIDTH,
                        y: pipe.bottomY,
                        life: 30
                    });
                }

                // Update pipe particles
                pipe.particles = pipe.particles.filter(p => {
                    p.x -= settings.pipeSpeed * speedMultiplier;
                    p.life--;
                    return p.life > 0;
                });
            }

            // Remove off-screen pipes
            pipes = pipes.filter(pipe => pipe.x > -PIPE_WIDTH);

            // Add new pipes
            if (pipes.length === 0 || pipes[pipes.length - 1].x < WIDTH - PIPE_SPACING) {
                createPipe();
            }
        }

        function updatePowerups() {
            powerups.forEach(powerup => {
                powerup.x -= settings.pipeSpeed * speedMultiplier;
                powerup.rotation += 0.05;
                powerup.wobble += 0.05;

                // Floating animation
                powerup.y += Math.sin(powerup.wobble) * 0.5;

                // Enhanced magnet effect
                if (bird.magnetized && !powerup.collected) {
                    const dx = bird.x - powerup.x;
                    const dy = bird.y - powerup.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 250) {
                        const force = (250 - dist) / 250 * 0.15;
                        powerup.x += dx * force;
                        powerup.y += dy * force;
                    }
                }

                // Check collection
                if (!powerup.collected) {
                    const dx = bird.x - powerup.x;
                    const dy = bird.y - powerup.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < bird.radius + powerup.radius + 5) {
                        powerup.collected = true;
                        powerupsCollected++;

                        // Apply power-up effect
                        switch (powerup.type) {
                            case 'shield':
                                bird.shielded = true;
                                bird.shieldTime = 480;
                                showAchievement("Shield Active!");
                                break;
                            case 'magnet':
                                bird.magnetized = true;
                                bird.magnetTime = 600;
                                showAchievement("Magnet Active!");
                                break;
                            case 'points':
                                const bonus = Math.floor(15 * settings.scoreMultiplier * bird.scoreMultiplier);
                                score += bonus;
                                document.getElementById('score').textContent = score;
                                showAchievement(`+${bonus} Points!`);
                                break;
                            case 'speed':
                                bird.speedBoost = true;
                                bird.speedBoostTime = 360;
                                speedMultiplier = Math.min(2.5, speedMultiplier * 1.2);

                                // Show speed boost indicator temporarily
                                document.getElementById('speedIndicator').classList.add('active');
                                if (speedBoostTimeout) clearTimeout(speedBoostTimeout);
                                speedBoostTimeout = setTimeout(() => {
                                    document.getElementById('speedIndicator').classList.remove('active');
                                }, 2000);

                                showAchievement("Speed Boost!");
                                break;
                            case 'multiplier':
                                bird.scoreMultiplier = 2;
                                bird.scoreMultiplierTime = 400;
                                showAchievement("2x Score!");
                                break;
                        }

                        // Power-up particles
                        for (let i = 0; i < 25; i++) {
                            particles.push({
                                x: powerup.x,
                                y: powerup.y,
                                vx: (Math.random() - 0.5) * 10,
                                vy: (Math.random() - 0.5) * 10,
                                size: Math.random() * 8 + 4,
                                color: COLORS[powerup.type] || COLORS.powerup,
                                life: 35,
                                type: 'powerup'
                            });
                        }

                        // Update UI
                        updatePowerupUI();

                        // Strong vibration for powerup
                        if (window.navigator.vibrate) {
                            window.navigator.vibrate([30, 10, 30]);
                        }
                    }
                }
            });

            // Remove off-screen or collected power-ups
            powerups = powerups.filter(p => p.x > -50 && !p.collected);
        }

        function updatePowerupUI() {
            const indicator = document.getElementById('powerupIndicator');
            const fill = document.getElementById('powerupFill');

            if (bird.shielded || bird.magnetized) {
                indicator.classList.add('active');
                let totalTime, currentTime, color1, color2;

                if (bird.shielded) {
                    totalTime = 480;
                    currentTime = bird.shieldTime;
                    color1 = COLORS.shield;
                    color2 = '#ff6699';
                } else {
                    totalTime = 600;
                    currentTime = bird.magnetTime;
                    color1 = COLORS.magnet;
                    color2 = '#99ff66';
                }

                fill.style.width = `${(currentTime / totalTime) * 100}%`;
                fill.style.background = `linear-gradient(90deg, ${color1}, ${color2})`;
            } else {
                indicator.classList.remove('active');
            }
        }

        function checkMilestone() {
            if (nextMilestone < milestones.length && score >= milestones[nextMilestone]) {
                const milestone = milestones[nextMilestone];
                showMilestone(`${milestone} POINTS!`);
                nextMilestone++;

                // Bonus for milestone
                const bonus = Math.floor(milestone * 0.1);
                score += bonus;
                document.getElementById('score').textContent = score;
            }
        }

        function showMilestone(text) {

            popup.classList.add('show');

            setTimeout(() => {
                popup.classList.remove('show');

        function showAchievement(text) {

            achievement.textContent = text;
            achievement.classList.add('show');

            setTimeout(() => {

        function checkCollision() {
            if (bird.invincible || gameState !== 'playing') return;

            for (let i = 0; i < pipes.length; i++) {
                const pipe = pipes[i];
                const birdLeft = bird.x - bird.radius;
                const birdRight = bird.x + bird.radius;
                const birdTop = bird.y - bird.radius;
                const birdBottom = bird.y + bird.radius;

                const pipeLeft = pipe.x;
                const pipeRight = pipe.x + PIPE_WIDTH;

                if (birdRight > pipeLeft && birdLeft < pipeRight) {
                    if (birdTop < pipe.topHeight || birdBottom > pipe.bottomY) {
                        const hit = (birdTop < pipe.topHeight) ?
                            isCircleRectCollision(bird.x, bird.y, bird.radius, pipeLeft, 0, PIPE_WIDTH, pipe.topHeight) :
                            isCircleRectCollision(bird.x, bird.y, bird.radius, pipeLeft, pipe.bottomY, PIPE_WIDTH, HEIGHT - pipe.bottomY);

                        if (hit) {
                            handleCollision();
                            return; // actually exits the function now
                        }
                    }
                }
            }
        }

        function isCircleRectCollision(circleX, circleY, circleRadius, rectX, rectY, rectWidth, rectHeight) {
            const closestX = Math.max(rectX, Math.min(circleX, rectX + rectWidth));
            const closestY = Math.max(rectY, Math.min(circleY, rectY + rectHeight));

            const distanceX = circleX - closestX;
            const distanceY = circleY - closestY;

            const distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);
            return distanceSquared < (circleRadius * circleRadius);
        }

        function handleCollision() {
            if (bird.shielded) {
                bird.shielded = false;
                bird.shieldTime = 0;
                bird.invincible = true;
                bird.invincibleTime = 120;
                maxCombo = Math.max(maxCombo, combo); // track before reset
                combo = 0;
                document.getElementById('comboIndicator').classList.remove('active');

                // Shield break particles
                for (let i = 0; i < 30; i++) {
                    particles.push({
                        x: bird.x,
                        y: bird.y,
                        vx: (Math.random() - 0.5) * 12,
                        vy: (Math.random() - 0.5) * 12,
                        size: Math.random() * 10 + 5,
                        color: COLORS.shield,
                        life: 45,
                        type: 'shield'
                    });
                }

                showAchievement("Shield Saved You!");
            } else {
                gameOver();
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                if (!p || typeof p.life !== 'number' || isNaN(p.life)) return false;

                p.x += p.vx || 0;
                p.y += p.vy || 0;

                if (p.type === 'jump' || p.type === 'trail') {
                    p.vy += 0.3;
                    p.vx *= 0.97;
                } else if (p.type === 'score' || p.type === 'powerup') {
                    p.vx *= 0.93;
                    p.vy *= 0.93;
                } else if (p.type === 'explosion') {
                    p.vx *= 0.95;
                    p.vy *= 0.95;
                    p.size *= 0.98;
                }

                p.life--;
                return p.life > 0;
            });

            // Update background particles
            backgroundParticles.forEach(p => {
                p.x -= p.speed * speedMultiplier * 1.5;
                if (p.x < -10) {
                    p.x = WIDTH + 10;
                    p.y = Math.random() * HEIGHT;
                }
            });

            // Update stars
            stars.forEach(star => {
                star.x -= star.speed * speedMultiplier * 1.5;
                star.twinkle += 0.05 + speedMultiplier * 0.02;
                if (star.x < -10) {
                    star.x = WIDTH + 10;
                    star.y = Math.random() * HEIGHT;
                }
            });
        }

        function gameOver() {
            gameState = 'gameOver';

            if (combo > maxCombo) maxCombo = combo;

            // Clear any active timeouts
            if (comboTimeout) clearTimeout(comboTimeout);
            if (speedBoostTimeout) clearTimeout(speedBoostTimeout);

            // Create massive explosion
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: bird.x,
                    y: bird.y,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.5) * 20,
                    size: Math.random() * 15 + 5,
                    color: COLORS.bird,
                    life: 80,
                    type: 'explosion'
                });
            }

            // Strong vibration
            if (window.navigator.vibrate) {
                window.navigator.vibrate([100, 50, 100, 50, 200]);
            }

            // Update best score
            if (score > bestScore) {
                bestScore = score;
                try {
                    localStorage.setItem('notamyFlyBest', bestScore);
                } catch (e) {
                    // Ignore localStorage errors
                }
                showAchievement("NEW BEST SCORE!");
            }

            // Show game over screen
            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('powerupsCollected').textContent = powerupsCollected;
            document.getElementById('maxSpeed').textContent = maxSpeedReached.toFixed(1) + 'x';
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function victory() {
            if (gameState !== 'playing') return; // guard
            gameState = 'gameOver';

            if (comboTimeout) clearTimeout(comboTimeout);
            if (speedBoostTimeout) clearTimeout(speedBoostTimeout);

            // Victory particles — gold explosion
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: bird.x,
                    y: bird.y,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.5) * 20,
                    size: Math.random() * 12 + 5,
                    color: ['#fff200', '#00fff0', '#ff00ff', '#39ff14', '#ff0066'][Math.floor(Math.random() * 5)],

                });

            if (window.navigator.vibrate) {
                window.navigator.vibrate([100, 50, 100, 50, 100, 50, 200]);

                bestScore = score;
                try { localStorage.setItem('notamyFlyBest', bestScore); } catch(e) {}

            title.textContent = 'YOU WIN!';
