            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('powerupsCollected').textContent = powerupsCollected;
            document.getElementById('maxSpeed').textContent = maxSpeedReached.toFixed(1) + 'x';
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function restartGame() {
            // Reset game over screen title styling
            const title = document.querySelector('#gameOverScreen .game-over-title');
            title.textContent = 'GAME OVER';
            title.style.color = '';
            title.style.textShadow = '';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('comboIndicator').classList.remove('active');
            document.getElementById('invincibilityCountdown').classList.remove('active', 'ending');
            document.getElementById('speedIndicator').classList.remove('active');
            startGame();
        }

        function drawBackground() {
            // Clear with cyberpunk gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            gradient.addColorStop(0, '#0d0015');
            gradient.addColorStop(1, '#06000e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Speed factor for visual effects
            // Boss phase: force high speed visual (even though pipes stopped)
            const sf = bossPhase ? Math.min(2.5, 1.8 + bossTimer / BOSS_DURATION * 0.7) : Math.min(speedMultiplier, 2.5);
            const streakLength = Math.max(0, (sf - 1.2) * 15); // streak grows after 1.2x

            // Draw stars — stretch into speed lines at high speed
            stars.forEach(star => {
                const opacity = (Math.sin(star.twinkle) + 1) / 2 * 0.8 + 0.2;
                ctx.fillStyle = `rgba(0, 255, 240, ${opacity * 0.6})`;
                if (streakLength > 2) {
                    // Star becomes a speed line
                    ctx.fillRect(star.x, star.y, star.size + streakLength, star.size * 0.6);
                } else {
                    ctx.fillRect(star.x, star.y, star.size, star.size);
                }
            });

            // Draw grid — scrolls faster with speed, gets brighter
            const gridOpacity = 0.03 + sf * 0.015;
            ctx.strokeStyle = `rgba(255, 0, 255, ${gridOpacity})`;
            ctx.lineWidth = 1;
            const gridSize = 50;

            // Vertical grid lines scroll with speed
            const gridScroll = (frameCount * sf * 1.5) % gridSize;
            for (let x = gridScroll; x < WIDTH; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, HEIGHT);
                ctx.stroke();
            }

            for (let y = 0; y < HEIGHT; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(WIDTH, y);
                ctx.stroke();
            }

            // Background particles — stretch into streaks at high speed
            backgroundParticles.forEach(p => {
                const speedGlow = sf > 1 ? (sf - 1) * 0.4 : 0;
                const alpha = Math.min(0.8, p.opacity + speedGlow);
                ctx.fillStyle = `rgba(0, 255, 240, ${alpha})`;
                if (streakLength > 2) {
                    ctx.fillRect(p.x, p.y, p.size + streakLength * 0.7, p.size * 0.5);
                } else {
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
            });

            // Speed streaks — horizontal lines that appear at high speed
            if (sf > 1.5) {
                const streakCount = Math.floor((sf - 1.5) * 12);
                ctx.strokeStyle = `rgba(0, 255, 240, ${(sf - 1.5) * 0.15})`;
                ctx.lineWidth = 1;
                for (let i = 0; i < streakCount; i++) {
                    const y = ((frameCount * 3 + i * 137) % HEIGHT);
                    const len = 30 + sf * 25;
                    const x = ((frameCount * sf * 4 + i * 211) % (WIDTH + len)) - len;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + len, y);
                    ctx.stroke();
                }
            }
        }

        function drawBird() {
            // Validate bird position
            if (!bird || typeof bird.x !== 'number' || typeof bird.y !== 'number' ||
                isNaN(bird.x) || isNaN(bird.y)) {
                return;
            }

            ctx.save();

            // Black outline for visibility
            ctx.fillStyle = 'rgba(6, 0, 14, 0.5)';
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.radius + 4, 0, Math.PI * 2);
            ctx.fill();

            // Enhanced trail
            bird.trail.forEach((point, i) => {
                if (!point || isNaN(point.x) || isNaN(point.y)) return;

                const gradient = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, bird.radius * 1.5);
                const color = bird.speedBoost ? '0, 255, 240' : '255, 0, 255';
                gradient.addColorStop(0, `rgba(${color}, ${point.opacity * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(point.x - bird.radius * 2, point.y - bird.radius * 2, bird.radius * 4, bird.radius * 4);
            });

            // Translate and rotate for bird
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.angle * Math.PI / 180);

            // Shield effect
            if (bird.shielded) {
                const shieldGradient = ctx.createRadialGradient(0, 0, bird.radius, 0, 0, bird.radius * 3);
                shieldGradient.addColorStop(0, 'transparent');
                shieldGradient.addColorStop(0.6, 'rgba(255, 0, 102, 0.2)');
                shieldGradient.addColorStop(1, 'rgba(255, 0, 102, 0.5)');
                ctx.fillStyle = shieldGradient;
                ctx.beginPath();
                ctx.arc(0, 0, bird.radius * 3, 0, Math.PI * 2);
                ctx.fill();

                // Shield border
                ctx.strokeStyle = 'rgba(255, 0, 102, 0.8)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, bird.radius * 2.5, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Magnet effect
            if (bird.magnetized) {
                ctx.strokeStyle = 'rgba(57, 255, 20, 0.4)';
                ctx.lineWidth = 2;
                for (let i = 1; i < 4; i++) {
                    ctx.beginPath();
                    ctx.arc(0, 0, bird.radius + i * 20, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            // Speed boost effect
            if (bird.speedBoost) {
                const speedGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, bird.radius * 4);
                speedGradient.addColorStop(0, 'rgba(0, 255, 240, 0.3)');
                speedGradient.addColorStop(0.5, 'rgba(0, 255, 240, 0.1)');
                speedGradient.addColorStop(1, 'transparent');
                ctx.fillStyle = speedGradient;
                ctx.fillRect(-bird.radius * 4, -bird.radius * 4, bird.radius * 8, bird.radius * 8);
            }

            // Invincibility effect
            if (bird.invincible) {
                const pulseScale = 1 + Math.sin(frameCount * 0.15) * 0.15;

                ctx.strokeStyle = 'rgba(0, 255, 240, 0.6)';
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                ctx.lineDashOffset = frameCount * 0.5;
                ctx.beginPath();
                ctx.arc(0, 0, bird.radius * 2.5 * pulseScale, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);

                if (frameCount % 15 < 8) {
                    const invincibleGradient = ctx.createRadialGradient(0, 0, bird.radius, 0, 0, bird.radius * 3.5);
                    invincibleGradient.addColorStop(0, 'rgba(0, 255, 240, 0.4)');
                    invincibleGradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = invincibleGradient;
                    ctx.beginPath();
                    ctx.arc(0, 0, bird.radius * 3.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Bird glow
            const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, bird.radius * 3);
            const glowColor = bird.speedBoost ? '0, 255, 240' : '255, 0, 255';
            glowGradient.addColorStop(0, `rgba(${glowColor}, 0.8)`);
            glowGradient.addColorStop(0.5, `rgba(${glowColor}, 0.4)`);
            glowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(-bird.radius * 3, -bird.radius * 3, bird.radius * 6, bird.radius * 6);

            // White outline
            ctx.fillStyle = '#00fff0';
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius + 2, 0, Math.PI * 2);
            ctx.fill();

            // Draw bird body
            ctx.fillStyle = bird.speedBoost ? COLORS.speed : COLORS.bird;
            ctx.strokeStyle = COLORS.birdGlow;
            ctx.lineWidth = 3;

            // Body
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Eye
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(bird.radius * 0.4, -bird.radius * 0.3, bird.radius * 0.35, 0, Math.PI * 2);
            ctx.fill();

            // Pupil
            ctx.fillStyle = '#06000e';
            ctx.beginPath();
            ctx.arc(bird.radius * 0.5, -bird.radius * 0.3, bird.radius * 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = '#ff0066';
            ctx.beginPath();
            ctx.moveTo(bird.radius * 0.8, -bird.radius * 0.1);
            ctx.lineTo(bird.radius * 1.4, 0);
            ctx.lineTo(bird.radius * 0.8, bird.radius * 0.1);
            ctx.closePath();
            ctx.fill();

            // Wing (animated)
            const wingOffset = Math.sin(bird.wingAnimation * 0.3) * 5;
            ctx.fillStyle = bird.speedBoost ? '#00fff0' : '#ff00ff';
            ctx.beginPath();
            ctx.ellipse(-bird.radius * 0.3, wingOffset, bird.radius * 0.8, bird.radius * 0.6, -0.3, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Final outline
            ctx.save();
            ctx.strokeStyle = '#00fff0';
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.8;
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.radius + 1, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                // Pipe glow effect
                const glowGradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_WIDTH, 0);
                glowGradient.addColorStop(0, 'transparent');
                glowGradient.addColorStop(0.5, `rgba(0, 255, 240, ${0.1 + speedMultiplier * 0.05})`);
                glowGradient.addColorStop(1, 'transparent');

                // Top pipe glow
                ctx.fillStyle = glowGradient;
                ctx.fillRect(pipe.x - 20, 0, PIPE_WIDTH + 40, pipe.topHeight);

                // Bottom pipe glow
                ctx.fillRect(pipe.x - 20, pipe.bottomY, PIPE_WIDTH + 40, HEIGHT - pipe.bottomY);

                // Pipe gradient — themed by type
                const pipeGradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_WIDTH, 0);
                if (pipe.finalZone) {
                    const pulse = 0.5 + Math.sin(frameCount * 0.1) * 0.2;
                    pipeGradient.addColorStop(0, `rgba(255, 0, 102, ${pulse})`);
                    pipeGradient.addColorStop(0.5, `rgba(255, 0, 255, ${pulse})`);
                    pipeGradient.addColorStop(1, `rgba(255, 0, 102, ${pulse})`);
                } else if (pipe.moving) {
                    const pulse = 0.6 + Math.sin(frameCount * 0.08) * 0.2;
                    pipeGradient.addColorStop(0, `rgba(255, 242, 0, ${pulse})`);
                    pipeGradient.addColorStop(0.5, `rgba(57, 255, 20, ${pulse})`);
                    pipeGradient.addColorStop(1, `rgba(255, 242, 0, ${pulse})`);
                } else {
                    pipeGradient.addColorStop(0, '#800080');
                    pipeGradient.addColorStop(0.5, COLORS.pipe);
                    pipeGradient.addColorStop(1, '#800080');
                }

                // Draw top pipe
                ctx.fillStyle = pipeGradient;
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);

                // Top pipe edge
                ctx.fillStyle = COLORS.pipeGlow;
                ctx.fillRect(pipe.x - 5, pipe.topHeight - 10, PIPE_WIDTH + 10, 10);

                // Draw bottom pipe
                ctx.fillStyle = pipeGradient;
                ctx.fillRect(pipe.x, pipe.bottomY, PIPE_WIDTH, HEIGHT - pipe.bottomY);

                // Bottom pipe edge
                ctx.fillStyle = COLORS.pipeGlow;
                ctx.fillRect(pipe.x - 5, pipe.bottomY, PIPE_WIDTH + 10, 10);

                // Pipe particles
                pipe.particles.forEach(p => {
                    const opacity = p.life / 30;
                    ctx.fillStyle = `rgba(0, 255, 240, ${opacity * 0.6})`;
                    ctx.fillRect(p.x, p.y - 2, 20, 4);
                });
            });
        }

        function drawPowerups() {
            powerups.forEach(powerup => {
                ctx.save();
                ctx.translate(powerup.x, powerup.y);
                ctx.rotate(powerup.rotation);

                // Power-up glow
                const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, powerup.radius * 3);
                let color1, color2, icon;

                switch (powerup.type) {
                    case 'shield':
                        color1 = COLORS.shield;
                        color2 = '#ff6699';
                        icon = 'S';
                        break;
                    case 'magnet':
                        color1 = COLORS.magnet;
                        color2 = '#99ff66';
                        icon = 'M';
                        break;
                    case 'points':
                        color1 = COLORS.powerup;
                        color2 = '#ffff66';
                        icon = '+';
                        break;
                    case 'speed':
                        color1 = COLORS.speed;
                        color2 = '#66ffff';
                        icon = '»';
                        break;
                    case 'multiplier':
                        color1 = COLORS.multiplier;
                        color2 = '#ff66ff';
                        icon = '2x';
                        break;
                }

                glowGradient.addColorStop(0, color1 + '80');
                glowGradient.addColorStop(0.5, color1 + '40');
                glowGradient.addColorStop(1, 'transparent');
                ctx.fillStyle = glowGradient;
                ctx.fillRect(-powerup.radius * 3, -powerup.radius * 3, powerup.radius * 6, powerup.radius * 6);

                // Power-up body
                const bodyGradient = ctx.createRadialGradient(-powerup.radius/3, -powerup.radius/3, 0, 0, 0, powerup.radius);
                bodyGradient.addColorStop(0, color2);
                bodyGradient.addColorStop(1, color1);

                ctx.fillStyle = bodyGradient;
                ctx.beginPath();
                ctx.arc(0, 0, powerup.radius, 0, Math.PI * 2);
                ctx.fill();

                // Outer ring
                ctx.strokeStyle = color1;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, powerup.radius + 4, 0, Math.PI * 2);
                ctx.stroke();

                // Inner ring
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, powerup.radius - 5, 0, Math.PI * 2);
                ctx.stroke();

                // Icon
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.font = "bold 22px 'Orbitron', monospace, Arial";
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(icon, 0, 0);

                ctx.restore();
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                if (!p || isNaN(p.x) || isNaN(p.y) || isNaN(p.life)) return;

                const opacity = p.life / (p.type === 'explosion' ? 80 : 45);

                if (p.type === 'explosion') {
                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    gradient.addColorStop(0, `rgba(255, 242, 0, ${opacity})`);
                    gradient.addColorStop(0.5, `rgba(255, 0, 102, ${opacity * 0.8})`);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                } else {
                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    const r = parseInt(p.color.slice(1, 3), 16) || 255;
                    const g = parseInt(p.color.slice(3, 5), 16) || 255;
                    const b = parseInt(p.color.slice(5, 7), 16) || 255;
                    gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${opacity})`);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                }
            });
        }

        function gameLoop(currentTime) {
            // Frame rate limiting
            if (currentTime - lastTime < frameTime) {
                requestAnimationFrame(gameLoop);
                return;
            }

            lastTime = currentTime;
            frameCount++;

            if (!ctx || canvas.width === 0 || canvas.height === 0) {
                requestAnimationFrame(gameLoop);
                return;
            }

            drawBackground();

            if (gameState === 'playing') {
                updateBird();
                if (bossPhase) {
                    updateBossPhase();
                    updatePowerups();
                } else {
                    updatePipes();
                    updatePowerups();
                    updateMissiles();
                    checkCollision();
                }
                updatePowerupUI();
            }

            updateParticles();

            if (bossPhase) {
                drawBossPhase();
            } else {
                drawPipes();
                drawMissiles();
            }
            drawPowerups();
            drawParticles();

            if (gameState === 'playing' || gameState === 'gameOver') {
                drawBird();
            }

            requestAnimationFrame(gameLoop);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            const newWidth = Math.min(window.innerWidth, 800);
            const newHeight = Math.min(window.innerHeight, 600);

            const widthRatio = newWidth / WIDTH;
            const heightRatio = newHeight / HEIGHT;

            WIDTH = newWidth;
            HEIGHT = newHeight;
            canvas.width = WIDTH;
            canvas.height = HEIGHT;

            // Adjust bird position safely
            if (bird && typeof bird.x === 'number' && typeof bird.y === 'number') {
                bird.x *= widthRatio;
                bird.y *= heightRatio;

                // Keep bird in bounds
                if (bird.x > WIDTH * 0.25) {
                    bird.x = WIDTH * 0.25;
                }
                if (bird.y < bird.radius) {
                    bird.y = bird.radius;
                }
                if (bird.y > HEIGHT - bird.radius) {
                    bird.y = HEIGHT - bird.radius;
                }
            }

            // Adjust pipes
            pipes.forEach(pipe => {
                pipe.x *= widthRatio;
                pipe.topHeight *= heightRatio;
                pipe.bottomY *= heightRatio;
            });

            // Adjust powerups
            powerups.forEach(powerup => {
                powerup.x *= widthRatio;
                powerup.y *= heightRatio;
            });

            // Reinitialize background elements
            initBackgroundElements();
        });

        // Initialize
        initBackgroundElements();
        document.getElementById('bestScore').textContent = bestScore;

        // Check for autostart parameter
        const urlParams = new URLSearchParams(window.location.search);
        const autostart = urlParams.get('autostart') === 'true';

        if (autostart) {
            document.getElementById('startScreen').style.display = 'none';
            currentDifficulty = 'easy';
            settings = {
                pipeSpeed: 2.5,
                pipeGap: 300,
                gravity: 0.25,
                jumpForce: -7.5,
                scoreMultiplier: 1,
                powerupChance: 0.5,
                winScore: 500
            };
            progressiveMode = true;
            setTimeout(() => {
                startGame();
            }, 500);
        }

        // Start game loop
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
