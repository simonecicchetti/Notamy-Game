<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#06000e">
    <title>Notamy Mini Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * { margin:0; padding:0; box-sizing:border-box;
            -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;
            -webkit-tap-highlight-color:transparent; }

        body {
            background: #06000e;
            font-family: 'Orbitron', -apple-system, system-ui, sans-serif;
            min-height: 100vh; color: #fff; margin: 0;
        }

        /* === BG === */
        .bg { position:fixed; inset:0; z-index:-10; overflow:hidden; }

        .bg-grid {
            position:absolute; inset:0;
            background-image:
                linear-gradient(rgba(0,255,240,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,240,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .bg-glow {
            position:absolute; border-radius:50%; filter:blur(120px); opacity:0.15;
            animation: drift 20s ease-in-out infinite;
        }
        .bg-glow.g1 { width:400px; height:400px; background:#00fff0; top:-200px; left:-100px; }
        .bg-glow.g2 { width:350px; height:350px; background:#ff00ff; bottom:-150px; right:-100px; animation-delay:7s; }
        .bg-glow.g3 { width:300px; height:300px; background:#39ff14; top:40%; left:60%; animation-delay:14s; }

        @keyframes drift {
            0%,100% { transform:translate(0,0) scale(1); }
            33% { transform:translate(80px,-60px) scale(1.1); }
            66% { transform:translate(-60px,80px) scale(0.9); }
        }

        /* Scanlines */
        .bg::after {
            content:''; position:absolute; inset:0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 6px);
            pointer-events:none;
        }

        /* === CONTAINER === */
        .container {
            position:relative; z-index:1; width:100%; max-width:900px;
            margin:0 auto; padding:40px 20px; min-height:100vh;
            display:flex; flex-direction:column;
        }

        /* === HEADER === */
        .header { text-align:center; margin-bottom:50px; }

        .logo {
            font-size: 80px; font-weight:900; letter-spacing:6px;
            background: linear-gradient(135deg, #00fff0, #ff00ff);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            margin-bottom:8px; line-height:1;
        }

        .subtitle {
            font-size:11px; font-weight:400; color:#ff00ff;
            letter-spacing:8px; text-transform:uppercase; opacity:0.6;
        }

        /* === GRID === */
        .grid {
            display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap:20px; max-width:800px; margin:0 auto; width:100%;
        }

        /* === CARDS === */
        .card {
            background: rgba(6,0,14,0.7);
            border: 1px solid var(--c, rgba(0,255,240,0.15));
            border-radius: 12px;
            padding: 28px 24px;
            text-align: center;
            text-decoration: none;
            display: block;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
        }

        .card::before {
            content:''; position:absolute; inset:0;
            background: radial-gradient(ellipse at 50% 0%, var(--cg, rgba(0,255,240,0.04)), transparent 70%);
            transition: opacity 0.3s; opacity:0;
        }

        @media (hover:hover) {
            .card:hover {
                transform: translateY(-6px);
                border-color: var(--ch, #00fff0);
                box-shadow: 0 8px 30px var(--cs, rgba(0,255,240,0.15));
            }
            .card:hover::before { opacity:1; }
        }

        .card:active {
            transform: translateY(-2px);
            border-color: var(--ch, #00fff0);
        }

        /* Icon */
        .icon {
            width:72px; height:72px; margin:0 auto 20px;
            border-radius:16px; display:flex; align-items:center; justify-content:center;
            background: var(--ig, linear-gradient(135deg, #00fff0, #00b8b0));
            padding:2px;
            box-shadow: 0 0 20px var(--cs, rgba(0,255,240,0.2));
        }

        .icon-inner {
            width:100%; height:100%; border-radius:14px;
            background: #06000e; display:flex; align-items:center; justify-content:center;
        }

        .title {
            font-size:18px; font-weight:700; color:#fff;
            margin-bottom:8px; letter-spacing:1px; text-transform:uppercase;
        }

        .desc {
            font-size:11px; font-weight:400; color:rgba(255,255,255,0.45);
            letter-spacing:1px; line-height:1.4;
        }

        /* Card themes */
        .card-crush  { --c:rgba(57,255,20,0.15); --ch:#39ff14; --cs:rgba(57,255,20,0.15);
                       --cg:rgba(57,255,20,0.04); --ig:linear-gradient(135deg,#39ff14,#28b80e); }
        .card-blocks { --c:rgba(0,255,240,0.15); --ch:#00fff0; --cs:rgba(0,255,240,0.15);
                       --cg:rgba(0,255,240,0.04); --ig:linear-gradient(135deg,#00fff0,#00b8b0); }
        .card-fly    { --c:rgba(255,0,255,0.15); --ch:#ff00ff; --cs:rgba(255,0,255,0.15);
                       --cg:rgba(255,0,255,0.04); --ig:linear-gradient(135deg,#ff00ff,#b800b8); }
        .card-bop    { --c:rgba(255,0,102,0.15); --ch:#ff0066; --cs:rgba(255,0,102,0.15);
                       --cg:rgba(255,0,102,0.04); --ig:linear-gradient(135deg,#ff0066,#b80048); }
        .card-stars  { --c:rgba(255,242,0,0.15); --ch:#fff200; --cs:rgba(255,242,0,0.15);
                       --cg:rgba(255,242,0,0.04); --ig:linear-gradient(135deg,#fff200,#b8a800); }

        /* Mini icons inside cards */
        .candy-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; width:36px; height:36px; }
        .candy-cell { border-radius:3px; }

        .tetris-wrap { position:relative; width:40px; height:40px; }
        .t-piece { position:absolute; display:grid; gap:1px; }
        .t-block { width:7px; height:7px; border-radius:1px; }
        .t-i { grid-template-columns:repeat(4,1fr); top:5px; left:3px; }
        .t-t { grid-template-columns:repeat(3,1fr); bottom:5px; right:3px; }
        .t-o { grid-template-columns:repeat(2,1fr); top:5px; right:7px; }

        .fly-wrap { position:relative; width:36px; height:36px; }
        .f-body { position:absolute; width:22px; height:22px; background:#ff00ff; border-radius:50%;
                  top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 12px rgba(255,0,255,0.5); }
        .f-wing { position:absolute; width:14px; height:10px; background:#00fff0; border-radius:50% 0 50% 0;
                  top:50%; left:2px; transform:translateY(-50%) rotate(-20deg); box-shadow:0 0 8px rgba(0,255,240,0.5); }
        .f-eye { position:absolute; width:4px; height:4px; background:#fff; border-radius:50%; top:7px; right:5px; }

        .bop-wrap { position:relative; width:36px; height:36px; }
        .b-bubble { position:absolute; width:22px; height:22px; background:#ff0066; border-radius:50%;
                    top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 12px rgba(255,0,102,0.5); }
        .b-glow { position:absolute; width:12px; height:12px; background:#fff; border-radius:50%;
                  top:8px; left:8px; opacity:0.25; }

        /* Footer */
        .footer {
            margin-top:auto; padding-top:40px; text-align:center;
            font-size:8px; color:rgba(255,255,255,0.15); letter-spacing:3px; text-transform:uppercase;
        }

        /* === LOADER === */
        .loader {
            position:fixed; inset:0; background:#06000e;
            display:flex; align-items:center; justify-content:center;
            z-index:9999; transition:opacity 0.3s;
        }
        .loader.hide { opacity:0; pointer-events:none; }
        .loader-ring {
            width:40px; height:40px;
            border:2px solid rgba(0,255,240,0.1); border-top-color:#00fff0;
            border-radius:50%; animation:spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* === MOBILE === */
        @media (max-width:768px) {
            .container { padding:20px 0; padding-top:max(20px,env(safe-area-inset-top));
                         padding-bottom:max(30px,calc(20px + env(safe-area-inset-bottom))); }
            .header { margin-bottom:30px; padding:0 16px; }
            .logo { font-size:48px; letter-spacing:3px; }
            .subtitle { font-size:9px; letter-spacing:5px; }

            .grid { display:flex; flex-direction:column; gap:0; padding:0; }

            .card {
                background:transparent; border:none; border-radius:0;
                padding:16px 20px; box-shadow:none; backdrop-filter:none;
                display:flex; align-items:center; gap:18px;
                border-bottom:1px solid rgba(255,255,255,0.05);
            }
            .card::before { display:none; }
            .card:last-child { border-bottom:none; }
            .card:active { background:rgba(255,255,255,0.03); transform:none; box-shadow:none; }

            .icon { width:56px; height:56px; margin:0; border-radius:14px; flex-shrink:0; }
            .icon-inner { border-radius:12px; }
            .game-info { flex:1; text-align:left; }
            .title { font-size:15px; margin-bottom:3px; letter-spacing:0.5px; }
            .desc { font-size:10px; }
        }

        @media (max-width:375px) {
            .logo { font-size:40px; }
            .subtitle { font-size:8px; letter-spacing:4px; }
            .card { padding:13px 16px; gap:14px; }
            .icon { width:50px; height:50px; border-radius:12px; }
            .icon-inner { border-radius:10px; }
            .title { font-size:14px; }
        }

        @supports (-webkit-touch-callout:none) {
            body { -webkit-overflow-scrolling:touch; }
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="bg-grid"></div>
        <div class="bg-glow g1"></div>
        <div class="bg-glow g2"></div>
        <div class="bg-glow g3"></div>
    </div>

    <div class="loader" id="loader"><div class="loader-ring"></div></div>

    <div class="container">
        <div class="header">
            <h1 class="logo">NOTAMY</h1>
            <div class="subtitle">MINI GAMES</div>
        </div>

        <div class="grid">
            <!-- Crush -->
            <a href="notamy-crash.html?autostart=true" class="card card-crush">
                <div class="icon">
                    <div class="icon-inner">
                        <div class="candy-grid">
                            <div class="candy-cell" style="background:#39ff14"></div>
                            <div class="candy-cell" style="background:#00fff0"></div>
                            <div class="candy-cell" style="background:#ff0066"></div>
                            <div class="candy-cell" style="background:#fff200"></div>
                            <div class="candy-cell" style="background:#00b8b0"></div>
                            <div class="candy-cell" style="background:#ff00ff"></div>
                            <div class="candy-cell" style="background:#ff0066"></div>
                            <div class="candy-cell" style="background:#00fff0"></div>
                            <div class="candy-cell" style="background:#39ff14"></div>
                        </div>
                    </div>
                </div>
                <div class="game-info">
                    <h2 class="title">Notamy Crush</h2>
                    <p class="desc">Match neon candies before time runs out</p>
                </div>
            </a>

            <!-- Blocks -->
            <a href="notamy-blocks.html?autostart=true" class="card card-blocks">
                <div class="icon">
                    <div class="icon-inner">
                        <div class="tetris-wrap">
                            <div class="t-piece t-i">
                                <div class="t-block" style="background:#00fff0"></div>
                                <div class="t-block" style="background:#00fff0"></div>
                                <div class="t-block" style="background:#00fff0"></div>
                                <div class="t-block" style="background:#00fff0"></div>
                            </div>
                            <div class="t-piece t-t">
                                <div class="t-block" style="background:#ff00ff"></div>
                                <div class="t-block" style="background:#ff00ff"></div>
                                <div class="t-block" style="background:#ff00ff"></div>
                                <div class="t-block" style="background:#ff00ff"></div>
                            </div>
                            <div class="t-piece t-o">
                                <div class="t-block" style="background:#fff200"></div>
                                <div class="t-block" style="background:#fff200"></div>
                                <div class="t-block" style="background:#fff200"></div>
                                <div class="t-block" style="background:#fff200"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="game-info">
                    <h2 class="title">Notamy Blocks</h2>
                    <p class="desc">Stack blocks in the neon grid</p>
                </div>
            </a>

            <!-- Fly -->
            <a href="notamy-fly.html?autostart=true" class="card card-fly">
                <div class="icon">
                    <div class="icon-inner">
                        <div class="fly-wrap">
                            <div class="f-body"></div>
                            <div class="f-wing"></div>
                            <div class="f-eye"></div>
                        </div>
                    </div>
                </div>
                <div class="game-info">
                    <h2 class="title">Notamy Fly</h2>
                    <p class="desc">Navigate through neon obstacles</p>
                </div>
            </a>

            <!-- Bop -->
            <a href="notamy-bop.html?autostart=true" class="card card-bop">
                <div class="icon">
                    <div class="icon-inner">
                        <div class="bop-wrap">
                            <div class="b-bubble"></div>
                            <div class="b-glow"></div>
                        </div>
                    </div>
                </div>
                <div class="game-info">
                    <h2 class="title">Notamy Bop</h2>
                    <p class="desc">Pop neon bubbles to score</p>
                </div>
            </a>

            <!-- Stars -->
            <a href="notamy-stars.html" class="card card-stars">
                <div class="icon">
                    <div class="icon-inner">
                        <div style="font-size:28px;line-height:1;">⭐</div>
                    </div>
                </div>
                <div class="game-info">
                    <h2 class="title">Notamy Stars</h2>
                    <p class="desc">Catch falling stars & gems</p>
                </div>
            </a>
        </div>

        <div class="footer">NOTAMY MINI GAMES</div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('loader').classList.add('hide'), 100);
        });
        document.querySelectorAll('.card').forEach(c => {
            c.addEventListener('touchstart', function() { this.style.background = 'rgba(255,255,255,0.03)'; });
            c.addEventListener('touchend', function() { this.style.background = ''; });
        });
    </script>
</body>
</html>
